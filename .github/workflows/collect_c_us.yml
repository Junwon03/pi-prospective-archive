name: collect-c-us
on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: collect-c-us-main
  cancel-in-progress: false
jobs:
  snapshot:
    if: github.ref_name == 'main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
      - name: fast-forward to current canonical branch
        run: git pull --ff-only origin ${GITHUB_REF_NAME}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.lock
      - name: invariant tests before writing snapshot
        run: python -m pytest -q
      - name: write snapshot
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python run_snapshot.py
      - name: commit snapshot (append-only)
        run: |
          git config user.name "pi-archive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add snapshots/
          git diff --cached --quiet && { echo "nothing to commit"; exit 0; }
          git commit -m "snapshot: $(date -u +%FT%H%MZ)"
          git push origin HEAD:${GITHUB_REF_NAME}
