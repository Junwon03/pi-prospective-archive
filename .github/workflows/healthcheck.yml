name: healthcheck
on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    if: github.ref_name == 'main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.lock
      - run: python -m pytest -q --no-header -x tests/test_workflows.py
      - run: python run_health_check.py
